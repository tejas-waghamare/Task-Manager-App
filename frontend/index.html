<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="./src/assets/mylogo.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Task Manager - Employee Management System</title>
    <!-- Font Awesome CDN -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <script>
      // Suppress extension-related errors completely
      (function() {
        // Filter console errors
        const originalConsoleError = console.error;
        console.error = function(...args) {
          const message = args[0]?.toString() || '';
          if (message.includes('listener indicated an asynchronous response') ||
              message.includes('message channel closed') ||
              message.includes('Extension:') ||
              message.includes('chrome-extension://')) {
            return;
          }
          originalConsoleError.apply(console, args);
        };

        // Block error events from extensions
        window.addEventListener('error', function(e) {
          if (e.message && (e.message.includes('listener indicated an asynchronous response') ||
              e.message.includes('message channel closed'))) {
            e.preventDefault();
            e.stopPropagation();
            return false;
          }
        });

        // Block unhandled promise rejections from extensions
        window.addEventListener('unhandledrejection', function(e) {
          if (e.reason && e.reason.message && 
              (e.reason.message.includes('listener indicated an asynchronous response') ||
               e.reason.message.includes('message channel closed'))) {
            e.preventDefault();
            e.stopPropagation();
            return false;
          }
        });
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
